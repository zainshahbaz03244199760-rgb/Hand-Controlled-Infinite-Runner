name: Gesture API CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:

    needs: test-build
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        run: |
          docker build -t zain7976/gesture-api:${{ github.sha }} .
          docker push zain7976/gesture-api:${{ github.sha }}

      - name: Configure kubectl
        run: |
          mkdir ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

      - name: Update deployment
        run: |
          kubectl set image deployment/gesture-api \
          gesture-api=zain7976/gesture-api:${{ github.sha }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/gesture-api
